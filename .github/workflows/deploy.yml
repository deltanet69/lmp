name: 🚀 Deploy Next.js to cPanel via FTP

on:
  push:
    branches: [main]
  repository_dispatch:
    types: [supabase-update]

jobs:
  build-and-deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v3

      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "20"
          cache: "npm"

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🛠️ Build Next.js app
        run: npm run build
        env:
          # ⭐ Tambahkan env variables yang diperlukan saat build
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}

      - name: 📤 Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: out/ # ⭐ folder hasil build Next.js
          server-dir: ${{ secrets.FTP_TARGET_DIR || 'public_html/' }} # ⭐ Gunakan public_html jika target dir kosong
          state-name: .ftp-deploy-sync-state.json # ⭐ Simpan state agar upload berikutnya lebih cepat
          exclude: |
            **/__next*
            **/*.txt
            **/.git*
            **/.git*/**
            **/node_modules/**
